name: Sync Lockfile

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - package.json

jobs:
  sync:
    name: npm install & commit lockfile
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet && echo "lockfile unchanged" || git commit -m "chore: sync package-lock.json [skip ci]"
          git push
