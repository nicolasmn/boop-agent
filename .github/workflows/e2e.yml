name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: End-to-End (Docker Compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write .env
        run: |
          cat <<EOF > .env
          NODE_ENV=test
          PORT=3456
          DATABASE_URL=postgresql://boop:boop@postgres:5432/boop_test
          ANTHROPIC_API_KEY=sk-ant-test-00000000
          TELEGRAM_BOT_TOKEN=000000000:test_token
          TELEGRAM_CHAT_ID=123456789
          EOF
      - name: Start stack
        run: docker compose -f docker-compose.test.yml up -d --build
      - name: Wait for server health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3456/health && break
            echo "waiting... ($i/30)"
            sleep 2
          done
      - name: Health check
        run: curl -sf http://localhost:3456/health | jq .
      - name: Chat smoke test
        run: |
          REPLY=$(curl -sf -X POST http://localhost:3456/chat \
            -H 'Content-Type: application/json' \
            -d '{"conversationId":"ci-test-001","content":"ping"}') \
          echo "Reply: $REPLY"
          echo "$REPLY" | jq -e '.reply != null'
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
