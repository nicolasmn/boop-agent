name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --testPathPattern=unit
        env:
          NODE_ENV: test
          # Stub secrets so modules load without real credentials
          ANTHROPIC_API_KEY: sk-ant-test-00000000
          DATABASE_URL: postgresql://test:test@localhost:5432/boop_test
          TELEGRAM_BOT_TOKEN: 000000000:test_token
          TELEGRAM_CHAT_ID: "123456789"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: boop
          POSTGRES_PASSWORD: boop
          POSTGRES_DB: boop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run migrations
        run: node scripts/migrate.mjs || true
        env:
          DATABASE_URL: postgresql://boop:boop@localhost:5432/boop_test
      - run: npm test -- --testPathPattern=integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://boop:boop@localhost:5432/boop_test
          ANTHROPIC_API_KEY: sk-ant-test-00000000
          TELEGRAM_BOT_TOKEN: 000000000:test_token
          TELEGRAM_CHAT_ID: "123456789"
          PORT: "3456"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: boop-agent:ci
