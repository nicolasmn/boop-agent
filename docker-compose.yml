services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: boop
      POSTGRES_USER: boop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boop_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boop -d boop"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
