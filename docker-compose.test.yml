version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boop
      POSTGRES_PASSWORD: boop
      POSTGRES_DB: boop_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boop"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    ports:
      - "3456:3456"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://boop:boop@postgres:5432/boop_test
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3456/health"]
      interval: 5s
      timeout: 5s
      retries: 12
